<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follow Me</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.box {
  animation: fade 1.5s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

h1 {
  font-size:30px;
}

p {
  opacity:0.8;
}

.btn {
  margin-top:20px;
  padding:15px 30px;
  background:#38bdf8;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.1);
  background:#0ea5e9;
}
</style>
</head>

<body>

<div class="box">
  <h1>Meni kuzat 🚀</h1>
  <p>Har kuni foydali kontent</p>

  <button class="btn" onclick="follow()">Follow</button>
</div>

<script>
function follow() {
  window.location.href = "https://instagram.com/USERNAME";
}
</script>

</body>
</html>
